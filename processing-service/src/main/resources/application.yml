server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: processing-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: presence-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 100
      properties:
        spring.json.trusted.packages: "com.presence.*"
        spring.json.value.default.type: com.presence.processing.model.RssiEvent
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      timeout: 2s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/presence_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Vaibhav@21}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  kafka:
    topic:
      rssi-events: rssi-events
  detection:
    window-size: 10
    movement-variance-threshold: 4.0
    presence-timeout-seconds: 30
    ema-alpha: 0.3
    noise-spike-threshold: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics